<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasanthaprakash E | Data Analyst Portfolio</title>
    <meta name="description" content="Data Analyst portfolio - SQL, Power BI, Python expert">
    <meta name="author" content="Vasanthaprakash E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#F8FAFC;color:#0F172A;opacity:0;transition:opacity .3s}
        body.loaded{opacity:1}
        .spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border:3px solid #E6FFFA;border-top-color:#14B8A6;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    </style>
</head>
<body>
    <div class="spinner"></div>
    <div id="app"></div>
    <script>
        window.addEventListener('load',()=>{
            setTimeout(()=>{
                document.querySelector('.spinner')?.remove();
                document.body.classList.add('loaded');
            },500);
        });
    </script>
</body>
</html>
